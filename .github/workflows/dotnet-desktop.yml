name: Build TSCutter

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x 

    - name: Publish / 編譯成單一檔案
      # 移除指定的路徑，讓 .NET 自動在根目錄尋找 .sln 或 .csproj 檔案並編譯
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish_output

    - name: Upload Artifact / 上傳編譯結果
      uses: actions/upload-artifact@v4
      with:
        name: TSCutter-Mod-Windows
        path: ./publish_output/
