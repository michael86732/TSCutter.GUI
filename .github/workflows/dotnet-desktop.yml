name: Build TSCutter

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # TSCutter 通常使用 .NET 8 或 6，這裡設 8 向下相容

    - name: Publish / 編譯成單一檔案
      # 針對 Windows x64 架構編譯，並打包成單一執行檔 (方便你直接使用)
      run: dotnet publish TSCutter.GUI/TSCutter.GUI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish_output

    - name: Upload Artifact / 上傳編譯結果
      uses: actions/upload-artifact@v4
      with:
        name: TSCutter-Mod-Windows
        path: ./publish_output/
